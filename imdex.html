<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Journey</title>

<style>

body{
margin:0;
font-family:'Segoe UI',Arial,sans-serif;
background:linear-gradient(180deg,#050814,#0b1227);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
position:relative;
}

/* النجوم */
body::before{
content:"";
position:fixed;
inset:0;
background-image:
radial-gradient(circle,#ffffff 1px,transparent 1px),
radial-gradient(circle,#ffffff 1px,transparent 1px);
background-size:90px 90px,140px 140px;
background-position:0 0,45px 45px;
opacity:.25;
animation:stars 35s linear infinite;
pointer-events:none;
}

@keyframes stars{
from{
transform:translateY(0);
}
to{
transform:translateY(90px);
}
}

.card{
width:92%;
max-width:470px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);
padding:30px;
border-radius:28px;
text-align:center;
position:relative;
z-index:2;
border:1px solid rgba(255,255,255,.08);
box-shadow:
0 20px 45px rgba(0,0,0,.45),
0 0 30px rgba(255,255,255,.05);
animation:fade .8s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h2{
font-weight:600;
letter-spacing:.5px;
margin-bottom:10px;
}

.progress{
width:100%;
height:8px;
background:rgba(255,255,255,.08);
border-radius:30px;
overflow:hidden;
margin:20px 0;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ffffff,#d7d7d7);
transition:1s;
}

button{
padding:12px 18px;
margin:8px;
border:none;
border-radius:14px;
background:rgba(255,255,255,.1);
color:white;
font-size:15px;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
background:white;
color:#111;
}

.locked{
opacity:.4;
cursor:not-allowed;
}

.timer{
font-size:12px;
opacity:.7;
margin-top:4px;
margin-bottom:10px;
}

#content{
margin-top:25px;
padding-top:15px;
border-top:1px solid rgba(255,255,255,.08);
line-height:1.9;
white-space:pre-line;
font-size:15px;
animation:fade .5s;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="card">

<h2>📖 Arabic Night 🤍</h2>

<p style="opacity:.75;margin-top:-5px;margin-bottom:20px;">
For someone who never gave up.
</p>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="buttons"></div>

<div id="content"></div>

</div>

<script>

const chapters = [
{
name:"Arabic",
text:`I know this period has been really hard on you.

We had ups and downs, arguments, and a lot of stress…
but you still kept going.`,
unlock:"2026-06-27T19:00"
},
{
name:"Chemistry",
text:`I know chemistry can feel confusing sometimes…

But you always tried again.`,
unlock:"2026-07-01T19:00"
},
{
name:"English",
text:`I know things weren’t always easy between us…

But you didn’t give up.`,
unlock:"2026-07-04T19:00"
},
{
name:"Physics",
text:`Not everything makes sense right away…

But you kept going anyway.`,
unlock:"2026-07-08T19:00"
},
{
name:"Biology",
text:`This is the last one…

You made it through everything.`,
unlock:"2026-07-15T19:00"
}
];

function now(){
return new Date();
}

function isUnlocked(ch){
return now() >= new Date(ch.unlock);
}

function getRemaining(time){
let diff = new Date(time) - new Date();
if(diff <= 0) return "Open now";
let h = Math.floor(diff/1000/60/60);
let m = Math.floor(diff/1000/60)%60;
let s = Math.floor(diff/1000)%60;
return `${h}h ${m}m ${s}s`;
}

const bar = document.getElementById("bar");
const buttons = document.getElementById("buttons");
const content = document.getElementById("content");

function render(){

buttons.innerHTML="";

chapters.forEach((c,i)=>{

let btn = document.createElement("button");
btn.innerText = c.name;

let timer = document.createElement("div");
timer.className="timer";

if(isUnlocked(c)){
btn.onclick = ()=>show(i);
timer.innerText = "Open now";
}else{
btn.disabled = true;
btn.classList.add("locked");
timer.innerText = "Opens in: " + getRemaining(c.unlock);
}

buttons.appendChild(btn);
buttons.appendChild(timer);

});

updateProgress();
}

function show(i){
content.innerText = chapters[i].text;
}

function updateProgress(){
let unlocked = chapters.filter(c=>isUnlocked(c)).length;
bar.style.width = (unlocked/chapters.length)*100 + "%";
}

setInterval(()=>{
render();
},1000);

render();
updateProgress();

</script>

</body>
</html>
